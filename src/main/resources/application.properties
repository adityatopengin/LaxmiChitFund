# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080
spring.application.name=LaxmiChitFund

# ===============================
# DATABASE CONFIGURATION (H2 - Local Testing)
# ===============================
spring.datasource.url=jdbc:h2:mem:laxmidb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Auto-create tables based on Entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# ===============================
# DATABASE CONFIGURATION (MySQL - Production)
# Uncomment these when ready to go live
# ===============================
# spring.datasource.url=jdbc:mysql://localhost:3306/laxmidb?useSSL=false
# spring.datasource.username=root
# spring.datasource.password=YourSecurePassword
# spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# ANGEL ONE SMART API CREDENTIALS
# ===============================
smartapi.key=YOUR_API_KEY_HERE
smartapi.client.id=YOUR_CLIENT_ID_HERE
smartapi.client.password=YOUR_PASSWORD_HERE

