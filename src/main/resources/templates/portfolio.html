<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laxmi Chit Fund - Portfolio</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; }
        .navbar { display: flex; justify-content: space-between; padding: 15px 20px; background-color: #1e1e1e; border-bottom: 1px solid #333; }
        .brand { font-size: 20px; font-weight: bold; color: #4caf50; text-decoration: none; }
        .account-info { display: flex; gap: 20px; align-items: center; }
        
        .container { padding: 30px; max-width: 1200px; margin: auto; }
        
        /* Summary Cards */
        .summary-cards { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { flex: 1; background-color: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; text-align: center; }
        .card h3 { margin: 0 0 10px 0; color: #aaa; font-size: 14px; }
        .card .value { font-size: 24px; font-weight: bold; }
        .profit { color: #4caf50; }
        .loss { color: #f44336; }
        
        /* Table Styles */
        table { width: 100%; border-collapse: collapse; background-color: #1e1e1e; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background-color: #2a2a2a; color: #aaa; font-weight: normal; }
        tr:hover { background-color: #252525; }
        
        .nav-links a { color: white; text-decoration: none; margin-right: 15px; }
        .nav-links a:hover { color: #4caf50; }
    </style>
</head>
<body>

    <div class="navbar">
        <div style="display: flex; gap: 30px; align-items: center;">
            <a href="/dashboard" class="brand">💰 Laxmi Chit Fund</a>
            <div class="nav-links">
                <a href="/dashboard">Trade</a>
                <a href="/portfolio" style="color: #4caf50;">Portfolio</a>
            </div>
        </div>
        <div class="account-info">
            <span>Cash: ₹<span th:text="${virtualCash}">0.00</span></span>
        </div>
    </div>

    <div class="container">
        <h2>Your Holdings</h2>
        
        <div class="summary-cards">
            <div class="card">
                <h3>Total Invested</h3>
                <div class="value">₹<span th:text="${totalInvested}">0.00</span></div>
            </div>
            <div class="card">
                <h3>Current Value</h3>
                <div class="value">₹<span th:text="${totalCurrentValue}">0.00</span></div>
            </div>
            <div class="card">
                <h3>Total P&L</h3>
                <div class="value" 
                     th:classappend="${#strings.startsWith(totalPL, '-')} ? 'loss' : 'profit'">
                    ₹<span th:text="${totalPL}">0.00</span>
                </div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Stock Symbol</th>
                    <th>Qty.</th>
                    <th>Avg. Buy Price</th>
                    <th>Total Investment</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="stock : ${holdings}">
                    <td style="font-weight: bold;" th:text="${stock.stockSymbol}">RELIANCE</td>
                    <td th:text="${stock.quantity}">10</td>
                    <td>₹<span th:text="${stock.averageBuyPrice}">2500.00</span></td>
                    <td>₹<span th:text="${stock.quantity * stock.averageBuyPrice}">25000.00</span></td>
                </tr>
                <tr th:if="${#lists.isEmpty(holdings)}">
                    <td colspan="4" style="text-align: center; color: #888; padding: 30px;">
                        You haven't bought any stocks yet. Go to the Trade page to start investing!
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</body>
</html>
