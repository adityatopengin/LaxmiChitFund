<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laxmi Chit Fund - Trading Terminal</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: #ffffff; }
        /* Navbar */
        .navbar { display: flex; justify-content: space-between; padding: 15px 20px; background-color: #1e1e1e; border-bottom: 1px solid #333; }
        .brand { font-size: 20px; font-weight: bold; color: #4caf50; }
        .account-info { display: flex; gap: 20px; align-items: center; }
        .balance { font-size: 18px; color: #ffd700; font-weight: bold; }
        .logout-btn { background-color: #d32f2f; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; text-decoration: none;}
        
        /* Main Layout */
        .container { display: flex; height: calc(100vh - 60px); }
        
        /* Left Panel - Watchlist */
        .watchlist { width: 300px; background-color: #1e1e1e; border-right: 1px solid #333; overflow-y: auto; padding: 10px; }
        .stock-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #333; cursor: pointer; }
        .stock-item:hover { background-color: #2a2a2a; }
        .stock-name { font-weight: bold; }
        .stock-price { color: #4caf50; }

        /* Center Panel - Chart & Trading */
        .main-content { flex-grow: 1; display: flex; flex-direction: column; padding: 20px; }
        .chart-container { height: 60%; background-color: #1e1e1e; border: 1px solid #333; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; color: #888;}
        
        /* Trade Panel */
        .trade-panel { background-color: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; }
        .trade-inputs { display: flex; gap: 15px; margin-bottom: 15px; }
        .trade-inputs input { flex: 1; padding: 10px; background-color: #2a2a2a; border: 1px solid #444; color: white; border-radius: 4px; }
        .action-btns { display: flex; gap: 10px; }
        .btn-buy { flex: 1; background-color: #4caf50; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
        .btn-sell { flex: 1; background-color: #f44336; color: white; border: none; padding: 15px; font-size: 16px; font-weight: bold; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="brand">💰 Laxmi Chit Fund Terminal</div>
        <div class="account-info">
            <span>Welcome, <span th:text="${username}">Trader</span>!</span>
            <div class="balance">Funds: ₹<span id="virtualCashDisplay" th:text="${virtualCash}">0.00</span></div>
            <a href="/logout" class="logout-btn">Logout</a>
        </div>
    </div>

    <div class="container">
        <div class="watchlist">
            <div class="stock-item" onclick="selectStock('RELIANCE', 2950.45)">
                <span class="stock-name">RELIANCE</span>
                <span class="stock-price">₹2950.45</span>
            </div>
            <div class="stock-item" onclick="selectStock('TCS', 3890.10)">
                <span class="stock-name">TCS</span>
                <span class="stock-price">₹3890.10</span>
            </div>
            <div class="stock-item" onclick="selectStock('ZOMATO', 156.30)">
                <span class="stock-name">ZOMATO</span>
                <span class="stock-price">₹156.30</span>
            </div>
        </div>

        <div class="main-content">
            <div class="chart-container">
                <h2>[ Live Chart Placeholder - TradingView Widget Goes Here ]</h2>
            </div>

            <div class="trade-panel">
                <h3 id="selectedStockLabel">Select a stock to trade</h3>
                
                <input type="hidden" id="userId" th:value="${userId}">
                <input type="hidden" id="currentStockSymbol">
                <input type="hidden" id="currentStockPrice">

                <div class="trade-inputs">
                    <input type="number" id="tradeQuantity" placeholder="Quantity (e.g. 10)" min="1">
                    <input type="text" id="totalValueDisplay" placeholder="Total Value: ₹0.00" disabled>
                </div>
                
                <div class="action-btns">
                    <button class="btn-buy" onclick="executeTrade('BUY')">BUY</button>
                    <button class="btn-sell" onclick="executeTrade('SELL')">SELL</button>
                </div>
                
                <div id="tradeMessage" style="margin-top: 15px; font-weight: bold;"></div>
            </div>
        </div>
    </div>

    </body>
</html>
